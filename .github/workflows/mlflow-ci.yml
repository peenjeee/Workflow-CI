name: Advanced MLflow CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  train-build-push:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MLProject
    env:
      MLFLOW_TRACKING_URI: file:./mlruns

    steps:
      - name: Run actions/checkout@v4
        uses: actions/checkout@v4

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Check Env
        run: |
          python --version
          docker --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run mlflow project
        run: mlflow run . --env-manager=local --experiment-name "Panji Workflow CI Training"

      - name: Get latest MLflow run_id
        id: runid
        shell: bash
        run: |
          RUN_ID="$(cat outputs/latest_run_id.txt)"
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "RUN_ID=${RUN_ID}" >> "$GITHUB_ENV"

      - name: Upload MLflow artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-run-${{ steps.runid.outputs.run_id }}
          path: |
            MLProject/mlruns
            MLProject/outputs

      - name: Upgrade MLflow for Docker build
        run: python -m pip install --upgrade "mlflow==3.1.4"

      - name: Build Docker Model
        run: |
          mlflow models build-docker -m "runs:/${RUN_ID}/model" -n "${{ secrets.DOCKERHUB_USERNAME }}/employee-attrition-panji:latest" --env-manager local

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag Docker Image
        run: |
          docker tag "${{ secrets.DOCKERHUB_USERNAME }}/employee-attrition-panji:latest" "${{ secrets.DOCKERHUB_USERNAME }}/employee-attrition-panji:${GITHUB_SHA}"

      - name: Push Docker Image
        run: |
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/employee-attrition-panji:latest"
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/employee-attrition-panji:${GITHUB_SHA}"
